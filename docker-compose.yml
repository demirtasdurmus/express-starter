services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.bundle
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-9000}
      - HOST=${HOST:-0.0.0.0}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://express-template.durmusdemirtas.com}
      - TRUST_PROXY_HOPS={TRUST_PROXY_HOPS:-1}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node',
          '-e',
          "require('http').get('http://localhost:${PORT}/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
