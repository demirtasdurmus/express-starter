name: Pipeline

on:
  pull_request:
    branches: [main]

  workflow_dispatch:

permissions:
  contents: read
  actions: write

env:
  PORT: 3000
  NODE_VERSION: 22
  # @see https://github.com/scarf-sh/scarf-js
  SCARF_ANALYTICS: false

jobs:
  quality-checking:
    runs-on: ubuntu-24.04
    steps:
      - name: Get Code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Type Check
        run: pnpm typecheck

      - name: Run Lint Check
        run: pnpm lint:check

      - name: Run Format Check
        run: pnpm format:check

      - name: Run Localization Keys Check
        run: pnpm i18n:check

  testing:
    needs: quality-checking
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Unit Tests
        run: pnpm test

      - name: Copy .env.example to .env
        run: |
          cp .env.example .env || true
          echo "NODE_ENV=test" >> .env

      - name: Run Integration Tests
        run: pnpm test:int

  building:
    needs: testing
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
